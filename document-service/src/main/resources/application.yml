server:
  port: 8085

spring:
  application:
    name: document-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/businessai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.businessai.documents: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# Document upload configuration
document:
  upload:
    max-file-size: 52428800  # 50MB in bytes
    allowed-types: TXT,DOCX,PDF,XLSX
