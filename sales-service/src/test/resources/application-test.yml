spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false

logging:
  level:
    com.businessai.sales: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
