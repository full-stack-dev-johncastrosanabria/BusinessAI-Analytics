spring:
  datasource:
    url: jdbc:mysql://localhost:3306/businessai_analytics_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.businessai.customer: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
