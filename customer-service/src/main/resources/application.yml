server:
  port: 8082

spring:
  application:
    name: customer-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/businessai?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.businessai.customer: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
