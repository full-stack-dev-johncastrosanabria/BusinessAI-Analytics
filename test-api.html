<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test Page</h1>
    <button onclick="testProducts()">Test Products</button>
    <button onclick="testCustomers()">Test Customers</button>
    <button onclick="testSales()">Test Sales</button>
    <button onclick="testForecasts()">Test Forecasts</button>
    <button onclick="testChatbot()">Test Chatbot</button>
    <button onclick="testDocuments()">Test Documents</button>
    <div id="results"></div>

    <script>
        const baseURL = 'http://localhost:8080';
        
        async function testAPI(endpoint, method = 'GET', body = null) {
            const results = document.getElementById('results');
            results.innerHTML += `<p>Testing ${endpoint}...</p>`;
            
            try {
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                    },
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                }
                
                const response = await fetch(baseURL + endpoint, options);
                const data = await response.json();
                results.innerHTML += `<p style="color: green;">✓ ${endpoint}: ${response.status} - ${JSON.stringify(data).substring(0, 100)}...</p>`;
            } catch (error) {
                results.innerHTML += `<p style="color: red;">✗ ${endpoint}: ${error.message}</p>`;
            }
        }
        
        function testProducts() {
            testAPI('/api/products');
        }
        
        function testCustomers() {
            testAPI('/api/customers');
        }
        
        function testSales() {
            testAPI('/api/sales');
        }
        
        function testForecasts() {
            testAPI('/api/ai/forecast/sales', 'POST');
        }
        
        function testChatbot() {
            testAPI('/api/ai/chatbot/query', 'POST', { question: 'What are the top products?' });
        }
        
        function testDocuments() {
            testAPI('/api/documents');
        }
    </script>
</body>
</html>
