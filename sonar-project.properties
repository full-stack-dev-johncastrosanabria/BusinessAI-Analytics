sonar.projectKey=full-stack-dev-johncastrosanabria_BusinessAI-Analytics
sonar.projectName=BusinessAI Analytics Platform
sonar.projectVersion=1.0.0

# Source encoding
sonar.sourceEncoding=UTF-8

# ─── Quality Gate Thresholds ──────────────────────────────────────────────────
# Security Rating: A (no vulnerabilities)
# Maintainability Rating: A (technical debt ratio <= 5%)
# Reliability Rating: A (no bugs)
# Coverage: >= 80%
# Duplicated Lines Density: <= 3%
# New Blocker Issues: 0
# New Critical Issues: 0
sonar.qualitygate.wait=true

# ─── Modules ──────────────────────────────────────────────────────────────────
sonar.modules=frontend,ai-service,api-gateway,product-service,customer-service,sales-service,analytics-service,document-service

# ─── Frontend (React/TypeScript) ──────────────────────────────────────────────
frontend.sonar.projectName=Frontend
frontend.sonar.projectBaseDir=frontend
frontend.sonar.sources=src
frontend.sonar.tests=src
frontend.sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
frontend.sonar.exclusions=**/node_modules/**,**/dist/**,**/__tests__/**,**/test/setup.ts
frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info
frontend.sonar.language=ts
frontend.sonar.typescript.tsconfigPath=tsconfig.json

# ─── AI Service (Python) ──────────────────────────────────────────────────────
ai-service.sonar.projectName=AI Service
ai-service.sonar.projectBaseDir=ai-service
ai-service.sonar.sources=.
ai-service.sonar.inclusions=**/*.py
ai-service.sonar.exclusions=**/.venv/**,**/__pycache__/**,**/tests/**,**/.pytest_cache/**,**/trained_models/**
ai-service.sonar.python.coverage.reportPaths=coverage.xml
ai-service.sonar.python.version=3.11
ai-service.sonar.language=py

# ─── API Gateway (Java/Spring Boot) ───────────────────────────────────────────
