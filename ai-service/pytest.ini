[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=80
markers =
    pbt: Property-based test
    unit: Unit test
    integration: Integration test
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
