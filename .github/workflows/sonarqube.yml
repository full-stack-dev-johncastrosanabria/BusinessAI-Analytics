name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ─── Frontend Analysis ────────────────────────────────────────────────────
  sonar-frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Check SonarQube Configuration
        id: sonar-check
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ SonarQube not configured - skipping scan" >> $GITHUB_STEP_SUMMARY
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: SonarQube Scan
        if: steps.sonar-check.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─── AI Service Analysis ──────────────────────────────────────────────────
  sonar-ai-service:
    name: AI Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml --cov-config=.coveragerc

      - name: Check SonarQube Configuration
        id: sonar-check
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ SonarQube not configured - skipping scan" >> $GITHUB_STEP_SUMMARY
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: SonarQube Scan
        if: steps.sonar-check.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: ai-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─── Java Microservices Analysis ─────────────────────────────────────────
  sonar-java-services:
    name: Java Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - analytics-service
          - customer-service
          - product-service
          - sales-service
          - document-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test with JaCoCo coverage
        run: mvn -B verify -Pcoverage --no-transfer-progress

      - name: Check SonarQube Configuration
        id: sonar-check
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ SonarQube not configured - skipping scan" >> $GITHUB_STEP_SUMMARY
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: SonarQube Scan
        if: steps.sonar-check.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: ${{ matrix.service }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─── Quality Gate Check ───────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - sonar-frontend
      - sonar-ai-service
      - sonar-java-services
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check SonarQube Configuration
        id: sonar-check
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Check Quality Gate Status
        if: steps.sonar-check.outputs.configured == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      
      - name: Quality Gate Summary
        run: |
          echo "## Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sonar-check.outputs.configured }}" == "true" ]; then
            echo "✅ SonarQube analysis completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ SonarQube not configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable SonarQube analysis, configure these secrets:" >> $GITHUB_STEP_SUMMARY
            echo "- SONAR_TOKEN" >> $GITHUB_STEP_SUMMARY
            echo "- SONAR_HOST_URL" >> $GITHUB_STEP_SUMMARY
          fi
